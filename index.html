      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      :root {
        --primary: #2563eb;
        --primary-light: #3b82f6;
        --bg: #f1f5f9;
        --sidebar-bg: #1e293b;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #6366f1;

      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .management-bg { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
      .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); }
      .card-hover { transition: all 0.2s ease; }
      .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
      .modern-table { border-collapse: collapse; }
      .modern-table th {
        background: #f8fafc; color: var(--text-secondary); font-weight: 600;
        font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
        padding: 0.875rem 1rem; text-align: left; border-bottom: 2px solid var(--border);
      }
      .modern-table td {
        padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9;
        color: var(--text); font-size: 0.875rem;
      }
      .modern-table tbody tr:hover { background: #f8fafc; }
      .kpi-card {
        background: var(--card-bg); border-radius: var(--radius);
        padding: 1.5rem; box-shadow: var(--shadow);
        display: flex; align-items: center; gap: 1rem;
        transition: all 0.2s ease;
      }
      .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
      .kpi-icon {
        width: 48px; height: 48px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.25rem;
      }
      .status-badge {
        display: inline-flex; align-items: center; padding: 0.2rem 0.625rem;
        border-radius: 9999px; font-size: 0.75rem; font-weight: 500;
      }
      .btn-primary {
        background: var(--primary); color: white; border: none;
        padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600;
        cursor: pointer; transition: all 0.15s ease;
      }
      .btn-primary:hover { background: var(--primary-light); }
      .form-input {
        width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid var(--border);
        border-radius: 0.625rem; font-size: 0.875rem; transition: border-color 0.15s ease;
        outline: none; background: #fff;
      }
      .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
